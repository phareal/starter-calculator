<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Starter Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator">
        <header class="calculator__display">
          <div class="calculator__display-value">0</div>
        </header>

        <div class="calculator__keypad">
          <button class="key key--function">C</button>
          <button class="key key--function">%</button>
          <button class="key key--function key--icon" aria-label="Backspace">
            ⌫
          </button>
          <button class="key key--operator">÷</button>

          <button class="key">7</button>
          <button class="key">8</button>
          <button class="key">9</button>
          <button class="key key--operator">×</button>

          <button class="key">4</button>
          <button class="key">5</button>
          <button class="key">6</button>
          <button class="key key--operator">−</button>

          <button class="key">1</button>
          <button class="key">2</button>
          <button class="key">3</button>
          <button class="key key--operator">+</button>

          <button class="key key--wide">0</button>
          <button class="key">.</button>
          <button class="key key--operator key--equals">=</button>
        </div>
      </section>
    </main>
  </body>
</html>
